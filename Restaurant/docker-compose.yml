services:
  postgres-db:
    image: postgres:15-alpine
    container_name: restaurant-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=123
    ports:
      - "5433:5432"
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d # Script para crear las DBs
      - postgres_data:/var/lib/postgresql/data
    networks:
      - restaurant-network

networks:
  restaurant-network:
    driver: bridge

volumes:
  postgres_data: